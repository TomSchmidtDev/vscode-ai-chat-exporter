name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version for build artifact
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PATCH_VERSION="${VERSION}-build.${{ github.run_number }}"
          node -e "const fs=require('fs'); const p=require('./package.json'); p.version='${PATCH_VERSION}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Build extension
        run: npm run build

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-build-${{ github.run_number }}
          path: '*.vsix'
          retention-days: 7
